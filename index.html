<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #181b1f;
      color: white;
      font-family: sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: 0 auto;
    }
    label { display: block; margin-top: 14px; margin-bottom: 8px; color: #aaa; font-size: 13px; }
    input {
      width: 100%;
      padding: 9px 10px;
      background: #2c2f35;
      border: 1px solid #444;
      color: white;
      border-radius: 5px;
      font-size: 14px;
    }
    .key-row { display: flex; gap: 8px; align-items: center; }
    .key-row input { flex: 1; }
    .btn-save {
      padding: 9px 14px;
      background: #1e6fbf;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    #key-status { font-size: 12px; color: #f5a623; margin-top: 5px; min-height: 16px; }
    .divider { border: none; border-top: 1px solid #333; margin: 18px 0; }

    .fuel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 4px;
    }
    .fuel-btn {
      padding: 16px 10px;
      background: #2c2f35;
      border: 2px solid #444;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .fuel-btn:active { opacity: 0.7; }
    .fuel-btn.selected {
      border-color: #f5a623;
      background: #2e2510;
      color: #f5a623;
    }
    .fuel-btn .fuel-icon { font-size: 28px; display: block; margin-bottom: 6px; }
    .fuel-btn .fuel-name { font-size: 15px; font-weight: bold; display: block; }
    .fuel-btn .fuel-code { font-size: 11px; color: #555; display: block; margin-top: 2px; }
    .fuel-btn.selected .fuel-code { color: #f5a623; }

    .preview-box {
      background: #2c2f35;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 14px;
      display: none;
    }
    .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .preview-row .plabel { color: #aaa; }
    .preview-row .pval { color: #f5a623; font-weight: bold; }
    .preview-encoded { text-align: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #444; }
    .preview-encoded .elabel { font-size: 11px; color: #555; }
    .preview-encoded .eval { font-size: 22px; font-weight: bold; color: white; }

    .submit-btn {
      margin-top: 16px;
      padding: 14px;
      background: #f5a623;
      color: #111;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
    }
    .submit-btn:active { opacity: 0.7; }
    #status { margin-top: 12px; font-size: 13px; min-height: 18px; text-align: center; }
  </style>
</head>
<body>

  <label>🔑 Write API Key</label>
  <div class="key-row">
    <input type="text" id="apikey" placeholder="ใส่ Write API Key">
    <button class="btn-save" onclick="saveKey()">💾 บันทึก</button>
  </div>
  <div id="key-status"></div>

  <hr class="divider">

  <label>⛽ ประเภทน้ำมัน</label>
  <div class="fuel-grid">
    <div class="fuel-btn" onclick="selectFuel(this, 1)">
      <span class="fuel-name">ดีเซล</span>
      <span class="fuel-code">รหัส 1</span>
    </div>
    <div class="fuel-btn" onclick="selectFuel(this, 2)">
      <span class="fuel-name">เบนซิน</span>
      <span class="fuel-code">รหัส 2</span>
    </div>
  </div>

  <label>🧴 ปริมาณ (ลิตร) สูงสุด 999 ลิตร</label>
  <input type="number" id="fuelAmount" placeholder="เช่น 50" min="1" max="999" step="1" oninput="updatePreview()">

  <!-- Preview -->
  <div class="preview-box" id="preview">
    <div class="preview-row">
      <span class="plabel">ประเภท (field1)</span>
      <span class="pval" id="p-type">—</span>
    </div>
    <div class="preview-row">
      <span class="plabel">ปริมาณ (field2)</span>
      <span class="pval" id="p-amount">—</span>
    </div>
  </div>

  <button class="submit-btn" onclick="sendData()">📤 ส่งข้อมูล</button>
  <div id="status"></div>

<script>
  const KEY_STORAGE = "ts_write_key";
  let selectedFuelCode = 0;
  let selectedFuelName = "";

  window.onload = function () {
    const saved = localStorage.getItem(KEY_STORAGE);
    if (saved) {
      document.getElementById("apikey").value = saved;
      document.getElementById("key-status").innerText = "✅ ใช้ key ที่บันทึกไว้";
    }
  };

  function saveKey() {
    const key = document.getElementById("apikey").value.trim();
    if (!key) { document.getElementById("key-status").innerText = "❌ กรุณาใส่ API Key"; return; }
    localStorage.setItem(KEY_STORAGE, key);
    document.getElementById("key-status").innerText = "✅ บันทึก Key แล้ว";
  }

  function selectFuel(el, code) {
    document.querySelectorAll(".fuel-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
    selectedFuelCode = code;
    selectedFuelName = code === 1 ? "ดีเซล" : "โซล่า";
    updatePreview();
  }

  function encodeValue(fuelCode, amount) {
    // เช่น diesel(1) + 50L = 1050
    //      solar(2)  + 30L = 2030
    const padded = String(amount).padStart(3, "0");
    return parseInt(fuelCode + padded);
  }

  function updatePreview() {
    const amount = parseInt(document.getElementById("fuelAmount").value);
    const preview = document.getElementById("preview");

    if (selectedFuelCode && amount > 0 && amount <= 999) {
      document.getElementById("p-type").innerText = selectedFuelCode + " (" + selectedFuelName + ")";
      document.getElementById("p-amount").innerText = amount + " ลิตร";
      preview.style.display = "block";
    } else {
      preview.style.display = "none";
    }
  }

  function sendData() {
    const key    = document.getElementById("apikey").value.trim();
    const amount = parseInt(document.getElementById("fuelAmount").value);

    if (!key)              { setStatus("❌ กรุณาใส่ Write API Key", "#f85149"); return; }
    if (!selectedFuelCode) { setStatus("❌ กรุณาเลือกประเภทน้ำมัน", "#f85149"); return; }
    if (!amount || amount > 999) { setStatus("❌ กรุณาใส่ปริมาณ 1-999 ลิตร", "#f85149"); return; }

    setStatus("กำลังส่ง...", "#aaa");

    fetch(`https://api.thingspeak.com/update?api_key=${key}&field1=${selectedFuelCode}&field2=${amount}`)
      .then(r => r.text())
      .then(res => {
        if (res === "0") {
          setStatus("❌ ส่งไม่สำเร็จ (รอ 15 วิแล้วลองใหม่)", "#f85149");
        } else {
          setStatus(`✅ ส่งสำเร็จ! ${selectedFuelName} ${amount} ลิตร (Entry: ${res})`, "#73bf69");
        }
      })
      .catch(e => setStatus("❌ Error: " + e, "#f85149"));
  }

  function setStatus(msg, color) {
    const el = document.getElementById("status");
    el.innerText = msg;
    el.style.color = color;
  }
</script>
</body>
</html>
